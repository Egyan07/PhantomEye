name: Bug Report
description: Report a bug in PhantomEye
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: PhantomEye Version
      description: Run `python main.py --version` to find this.
      placeholder: "e.g. 1.4.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Windows Version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Open PhantomEye GUI
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste any relevant log output from `phantom_eye.log`.
      render: text
