<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <rect width="1280" height="320" fill="#0d1117"/>

  <!-- Obito-style masked figure -->
  <g transform="translate(95, 20)">
    <!-- Cloak/high collar -->
    <path d="M50,280 L30,180 C25,140 35,110 50,90 L60,75 L70,65 C80,55 95,45 110,42 C125,45 140,55 150,65 L160,75 L170,90 C185,110 195,140 190,180 L170,280 Z" fill="#161b22"/>

    <!-- Head shape -->
    <ellipse cx="110" cy="105" rx="55" ry="62" fill="#161b22"/>

    <!-- Mask — orange swirl pattern (Obito's mask) -->
    <ellipse cx="110" cy="105" rx="50" ry="57" fill="#e8630a"/>

    <!-- Swirl lines on mask -->
    <path d="M110,48 C85,55 70,75 68,100 C66,130 80,155 110,162" fill="none" stroke="#c44d00" stroke-width="2.5"/>
    <path d="M110,55 C90,62 78,78 76,100 C74,125 85,148 110,155" fill="none" stroke="#c44d00" stroke-width="2"/>
    <path d="M110,63 C95,68 86,82 84,100 C82,120 90,140 110,147" fill="none" stroke="#c44d00" stroke-width="1.5"/>

    <!-- Single eye hole — right side (Obito's signature) -->
    <ellipse cx="130" cy="100" rx="22" ry="20" fill="#0d1117"/>

    <!-- Sharingan eye -->
    <!-- Outer red iris -->
    <circle cx="130" cy="100" r="14" fill="#b91c1c"/>
    <!-- Inner ring -->
    <circle cx="130" cy="100" r="10" fill="#dc2626"/>
    <!-- Pupil -->
    <circle cx="130" cy="100" r="4" fill="#0d1117"/>
    <!-- Three tomoe -->
    <g fill="#0d1117">
      <!-- Tomoe 1 (top) -->
      <circle cx="130" cy="89" r="2.2"/>
      <path d="M130,89 Q134,91 132,95" stroke="#0d1117" stroke-width="1.5" fill="none"/>
      <!-- Tomoe 2 (bottom-left) -->
      <circle cx="121" cy="106" r="2.2"/>
      <path d="M121,106 Q123,102 127,103" stroke="#0d1117" stroke-width="1.5" fill="none"/>
      <!-- Tomoe 3 (bottom-right) -->
      <circle cx="139" cy="106" r="2.2"/>
      <path d="M139,106 Q137,102 133,103" stroke="#0d1117" stroke-width="1.5" fill="none"/>
    </g>
    <!-- Sharingan glow -->
    <circle cx="130" cy="100" r="16" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
    <circle cx="130" cy="100" r="20" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.2"/>

    <!-- High collar details -->
    <path d="M60,150 L55,170 C50,190 48,210 50,230 L55,260" fill="none" stroke="#21262d" stroke-width="1.5"/>
    <path d="M160,150 L165,170 C170,190 172,210 170,230 L165,260" fill="none" stroke="#21262d" stroke-width="1.5"/>
  </g>

  <!-- PhantomEye text -->
  <text x="340" y="150" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#e6edf3" letter-spacing="-1">PhantomEye</text>

  <!-- Tagline -->
  <text x="344" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#8b949e" letter-spacing="4">See the threats they can't.</text>
</svg>
