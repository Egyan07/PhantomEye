<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <rect width="1280" height="320" fill="#0d1117"/>

  <!-- Phantom silhouette — hooded figure with glowing eye -->
  <g transform="translate(100, 25)">
    <!-- Hood/cloak body -->
    <path d="M100,20 C60,20 30,55 30,95 L30,140 C30,165 40,185 55,200 L25,260 L55,240 L75,260 L95,240 L115,260 L135,240 L155,260 L185,260 L155,200 C170,185 180,165 180,140 L180,95 C180,55 150,20 110,20 Z" fill="#161b22"/>
    <!-- Hood inner shadow -->
    <path d="M100,28 C65,28 38,58 38,95 L38,130 C38,135 40,140 42,145 L70,145 C75,120 85,100 105,100 C125,100 135,120 140,145 L168,145 C170,140 172,135 172,130 L172,95 C172,58 145,28 110,28 Z" fill="#0d1117"/>
    <!-- Glowing eye — single, menacing -->
    <circle cx="110" cy="115" r="8" fill="#2ea043" opacity="0.9"/>
    <circle cx="110" cy="115" r="4" fill="#3fb950"/>
    <circle cx="110" cy="115" r="14" fill="none" stroke="#2ea043" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- PhantomEye text -->
  <text x="340" y="150" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#e6edf3" letter-spacing="-1">PhantomEye</text>

  <!-- Tagline -->
  <text x="344" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#8b949e" letter-spacing="4">See the threats they can't.</text>
</svg>
